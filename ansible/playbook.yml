---
- name: Deploy nodeapp1 node app
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 3000
    app_name: nodeapp1

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Node.js 20.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Install git
      apt:
        name: git
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: ubuntu

    - name: Install PostgreSQL
      when: install_db | default('') | string == 'true' and db_type | default('') == 'postgresql'
      block:
        - name: Install PostgreSQL packages
          apt:
            name:
              - postgresql
              - postgresql-contrib
              - python3-psycopg2
            state: present

        - name: Start and enable PostgreSQL
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: Configure PostgreSQL md5 auth
          shell: |
            PG_HBA=$(sudo -u postgres psql -t -P format=unaligned -c "SHOW hba_file")
            sed -i "s/local\s\+all\s\+all\s\+peer/local all all md5/" "$PG_HBA"
            sed -i "s/host\s\+all\s\+all\s\+127.0.0.1\/32\s\+ident/host all all 127.0.0.1\/32 md5/" "$PG_HBA"
            sed -i "s/host\s\+all\s\+all\s\+::1\/128\s\+ident/host all all ::1\/128 md5/" "$PG_HBA"
          args:
            executable: /bin/bash

        - name: Create PostgreSQL database and user
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username | default(db_user | default('appuser')) }}'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER {{ db_username | default(db_user | default('appuser')) }} WITH PASSWORD '{{ db_password | default('') }}';"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name | default('appdb') }}'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE {{ db_name | default('appdb') }} OWNER {{ db_username | default(db_user | default('appuser')) }};"
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name | default('appdb') }} TO {{ db_username | default(db_user | default('appuser')) }};"
          args:
            executable: /bin/bash

        - name: Restart PostgreSQL
          service:
            name: postgresql
            state: restarted

    - name: Install MySQL
      when: install_db | default('') | string == 'true' and db_type | default('') == 'mysql'
      block:
        - name: Install MySQL packages
          apt:
            name:
              - mysql-server
              - mysql-client
            state: present

        - name: Start and enable MySQL
          service:
            name: mysql
            state: started
            enabled: yes

        - name: Create MySQL database and user
          shell: |
            mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`{{ db_name | default('appdb') }}\`;"
            mysql -u root -e "CREATE USER IF NOT EXISTS '{{ db_username | default(db_user | default('appuser')) }}'@'localhost' IDENTIFIED BY '{{ db_password | default('') }}';"
            mysql -u root -e "GRANT ALL PRIVILEGES ON \`{{ db_name | default('appdb') }}\`.* TO '{{ db_username | default(db_user | default('appuser')) }}'@'localhost';"
            mysql -u root -e "FLUSH PRIVILEGES;"
          args:
            executable: /bin/bash

    - name: Install MongoDB
      when: install_db | default('') | string == 'true' and db_type | default('') == 'mongodb'
      block:
        - name: Add MongoDB apt key
          shell: |
            curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
              gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
          args:
            creates: /usr/share/keyrings/mongodb-server-7.0.gpg

        - name: Add MongoDB apt repository
          copy:
            content: "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse\n"
            dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
            mode: '0644'

        - name: Update apt cache for MongoDB
          apt:
            update_cache: yes

        - name: Install MongoDB
          apt:
            name: mongodb-org
            state: present

        - name: Start and enable MongoDB
          service:
            name: mongod
            state: started
            enabled: yes

        - name: Initialize MongoDB database
          shell: |
            mongosh --quiet --eval "
              use {{ db_name | default('appdb') }};
              db.createCollection('init');
            "
          args:
            executable: /bin/bash

    - name: Write /opt/app/.env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          {% if node_env_database_url | default('') != '' %}
          DATABASE_URL={{ node_env_database_url }}
          {% endif %}
          {% if node_env_mongo_uri | default('') != '' %}
          MONGO_URI={{ node_env_mongo_uri }}
          {% endif %}
          {% if node_env_db_host | default('') != '' %}
          DB_HOST={{ node_env_db_host }}
          {% endif %}
          {% if node_env_db_port | default('') != '' %}
          DB_PORT={{ node_env_db_port }}
          {% endif %}
          {% if node_env_db_name | default('') != '' %}
          DB_NAME={{ node_env_db_name }}
          {% endif %}
          {% if node_env_db_user | default('') != '' %}
          DB_USER={{ node_env_db_user }}
          {% endif %}
          {% if node_env_db_password | default('') != '' %}
          DB_PASSWORD={{ node_env_db_password }}
          {% endif %}
          PORT=3000
          HOST=0.0.0.0

    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
      become: yes
      become_user: ubuntu

    - name: Start app with PM2
      shell: |
        pm2 delete app 2>/dev/null || true
        set -a
        [ -f "{{ app_dir }}/.env" ] && . "{{ app_dir }}/.env"
        export PORT="${PORT:-3000}"
        export HOST="${HOST:-0.0.0.0}"
        set +a
        if [ -f "{{ app_dir }}/package.json" ] && grep -q '"start"' "{{ app_dir }}/package.json"; then
          pm2 start npm --name app -- start --update-env
        elif [ -f "{{ app_dir }}/server.js" ]; then
          pm2 start "{{ app_dir }}/server.js" --name app --update-env
        elif [ -f "{{ app_dir }}/index.js" ]; then
          pm2 start "{{ app_dir }}/index.js" --name app --update-env
        elif [ -f "{{ app_dir }}/app.js" ]; then
          pm2 start "{{ app_dir }}/app.js" --name app --update-env
        else
          echo "No Node entrypoint found in {{ app_dir }}" >&2
          exit 1
        fi
        pm2 save
      args:
        executable: /bin/bash
        chdir: "{{ app_dir }}"
      become: yes
      become_user: ubuntu
      environment:
        PORT: "3000"
        HOST: "0.0.0.0"

    - name: Configure PM2 startup
      shell: pm2 startup systemd -u ubuntu --hp /home/ubuntu
      args:
        executable: /bin/bash
      become: yes

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-enabled/app
        mode: '0644'
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://localhost:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: Remove default nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: Wait for app to be ready on port 3000
      wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 120
        delay: 10
      register: app_wait
      ignore_errors: yes

    - name: Print PM2 logs if app did not start
      shell: pm2 logs --lines 100 app --nostream
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes

    - name: Print PM2 status if app did not start
      shell: pm2 status
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes

    - name: Print .env file if app did not start
      shell: cat {{ app_dir }}/.env || true
      when: app_wait is failed
      ignore_errors: yes

    - name: Print node version
      shell: node --version && npm --version
      when: app_wait is failed
      ignore_errors: yes

    - name: Try starting app manually to capture error
      shell: |
        cd {{ app_dir }}
        set -a
        [ -f .env ] && . .env
        set +a
        export PORT=3000
        export HOST=0.0.0.0
        timeout 10 node server.js 2>&1 || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes
      register: manual_start

    - name: Show manual start output
      debug:
        var: manual_start.stdout_lines
      when: app_wait is failed and manual_start is defined

    - name: Fail if app did not start
      fail:
        msg: "App did not start on port 3000 within timeout. Check PM2 logs above."
      when: app_wait is failed

    - name: Print server IP
      debug:
        msg: "server_ip={{ ansible_host }}"